<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookVerse - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: #111;
            border-radius: 15px;
            overflow: hidden;
        }
        .admin-table th, .admin-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #222;
        }
        .admin-table th {
            background: #1a1a1a;
            color: #a855f7;
        }
        .admin-table tr:hover {
            background: #161616;
        }
        .action-btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn-delete:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color:white; text-decoration:none;">BookVerse</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="catalog.html">Catalog</a></li>
            <li><a href="admin.html" class="active">Admin Panel</a></li>
        </ul>
    </nav>

    <section class="admin-section" style="padding: 120px 8% 60px 8%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 class="section-title" style="margin: 0;">Database <span>Management</span></h2>
            <button id="open-add-book-modal" class="btn-primary">+ Add New Book</button>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Cover</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Category</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-database-table">
            </tbody>
        </table>
    </section>

    <div id="add-book-modal" class="modal">
        <div class="modal-content">
            <span id="close-add-modal" class="close-btn">&times;</span>
            <h2>Add New Book to <span>Database</span></h2>
            <form id="add-book-form" style="margin-top: 20px;">
                <input type="text" id="new-title" placeholder="Book Title" required style="width:100%; padding:12px; margin-bottom:15px; background:#1f1f1f; border:1px solid #333; color:white; border-radius:8px;">
                <input type="text" id="new-author" placeholder="Author" required style="width:100%; padding:12px; margin-bottom:15px; background:#1f1f1f; border:1px solid #333; color:white; border-radius:8px;">
                <input type="url" id="new-image" placeholder="Image URL (Optional)" style="width:100%; padding:12px; margin-bottom:15px; background:#1f1f1f; border:1px solid #333; color:white; border-radius:8px;">
                
                <select id="new-category" style="width:100%; padding:12px; margin-bottom:15px; background:#1f1f1f; border:1px solid #333; color:white; border-radius:8px;">
                    <option value="Fantasy">Fantasy</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="History">History</option>
                    <option value="Business">Business</option>
                    <option value="Romance">Romance</option>
                    <option value="Psychology">Psychology</option>
                </select>

                <textarea id="new-description" placeholder="Short Book Description..." rows="4" required style="width:100%; padding:12px; margin-bottom:20px; background:#1f1f1f; border:1px solid #333; color:white; border-radius:8px; resize:none;"></textarea>
                <button type="submit" class="btn-primary" style="width: 100%;">Upload to System</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const tableBody = document.getElementById("admin-database-table");

        function renderAdminTable() {
            tableBody.innerHTML = "";
            
            booksDatabase.forEach(book => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><img src="${book.img}" alt="" style="width: 40px; height: 60px; object-fit: cover; border-radius: 4px;"></td>
                    <td style="font-weight: bold; color: white;">${book.title}</td>
                    <td>${book.author}</td>
                    <td><span style="background: rgba(168,85,247,0.1); color: #a855f7; padding: 4px 10px; border-radius: 12px; font-size: 13px;">${book.category}</span></td>
                    <td><button class="action-btn-delete" onclick="deleteBookFromAdmin(${book.id})"><i class="fa-solid fa-trash"></i></button></td>
                `;
                tableBody.appendChild(row);
            });
        }

        function deleteBookFromAdmin(id) {
             if (confirm("Are you sure you want to delete this book?")) {
                deleteBook(id); // uses the async API version now
                renderAdminTable();
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderAdminTable();
            
            const form = document.getElementById("add-book-form");
            if(form) {
                form.addEventListener("submit", () => {
                    setTimeout(renderAdminTable, 100);
                });
            }
        });
    </script>
</body>
</html>
